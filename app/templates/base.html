<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceVault Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Sora:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body class="relative min-h-screen text-slate-100 noise-layer">
    <header class="px-6 py-6">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div class="text-lg font-semibold tracking-wide">
          <span class="gold-accent">VoiceVault</span> Bank
        </div>
        <nav class="flex items-center gap-6 text-sm">
          <a class="btn-ink px-4 py-2 rounded-full" href="/">Home</a>
          <a class="btn-ink px-4 py-2 rounded-full" href="/register">Open Account</a>
          <a class="btn-ink px-4 py-2 rounded-full" href="/login">Voice Login</a>
        </nav>
      </div>
    </header>

    <main class="px-6 pb-20">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
